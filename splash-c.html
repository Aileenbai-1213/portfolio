<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Splash C — ailin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-dark: #16120d;
    --bg: #f4f1ec;
    --ink: #1a1510;
    --ink-light: rgba(244,241,236,0.9);
    --ink-dim: rgba(244,241,236,0.35);
    --accent: #e8572a;
    --ease: cubic-bezier(.22,1,.36,1);
  }
  * { cursor: none !important; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  /* ===== SPLASH ===== */
  #splash {
    position: fixed; inset: 0;
    background: var(--bg-dark);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    transition: opacity 1s var(--ease);
  }
  #splash.leaving { opacity: 0; pointer-events: none; }

  /* 细网格纹理 */
  #splash::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(244,241,236,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,241,236,.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  /* 顶部签名 */
  .splash-logo {
    position: absolute; top: 36px; left: 48px;
    font-family: 'Lora', serif;
    font-size: 18px; font-weight: 600; letter-spacing: -.01em;
    color: var(--ink-light);
    opacity: 0;
    animation: fadeIn .6s .3s forwards;
  }
  .splash-logo .dot { color: var(--accent); }

  /* 主打字区 */
  .typewriter-wrap {
    text-align: center;
    max-width: 820px;
    padding: 0 32px;
  }

  .typewriter-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeIn .5s .6s forwards;
  }

  .typewriter-text {
    font-family: 'Lora', serif;
    font-size: clamp(28px, 5vw, 60px);
    font-weight: 600; letter-spacing: -.025em; line-height: 1.18;
    color: var(--ink-light);
    min-height: 1.4em;
  }

  /* 打字光标 */
  .type-cursor {
    display: inline-block;
    width: 3px; height: 1em;
    background: var(--accent);
    margin-left: 3px;
    vertical-align: middle;
    animation: blink .85s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* 橘色高亮词 */
  .accent-word { color: var(--accent); font-style: italic; }

  /* Enter 按钮（打字完成后出现） */
  .splash-btn {
    display: inline-flex; align-items: center; gap: 12px;
    margin-top: 52px;
    padding: 15px 36px; border-radius: 100px;
    border: 1.5px solid rgba(244,241,236,0.2);
    background: transparent; color: var(--ink-light);
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 400; letter-spacing: .1em; text-transform: uppercase;
    opacity: 0;
    transition: border-color .3s, background .3s, color .3s, transform .3s var(--ease), opacity .6s var(--ease);
    transform: translateY(12px);
  }
  .splash-btn.visible { opacity: 1; transform: translateY(0); }
  .splash-btn:hover {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
    transform: translateY(-2px);
  }
  .splash-btn .arrow {
    transition: transform .3s var(--ease);
  }
  .splash-btn:hover .arrow { transform: translateX(4px); }

  /* 底部进度条 */
  .type-progress {
    position: absolute; bottom: 0; left: 0;
    height: 2px; background: var(--accent);
    width: 0%; transition: width .1s linear;
    opacity: .6;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  /* ===== CURSOR ===== */
  .cursor-dot {
    position: fixed; width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: width .25s var(--ease), height .25s var(--ease);
  }
  .cursor-dot.hovering { width: 22px; height: 22px; box-shadow: 0 0 0 4px rgba(232,87,42,0.18); }
</style>
</head>
<body>

<div class="cursor-dot" id="cursorDot"></div>

<div id="splash">
  <div class="splash-logo">ailin<span class="dot">.</span></div>

  <div class="typewriter-wrap">
    <div class="typewriter-label">Product &amp; UX Designer</div>
    <div class="typewriter-text" id="typeTarget"><span class="type-cursor"></span></div>
    <button class="splash-btn" id="enterBtn">
      进入作品集
      <span class="arrow">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </button>
  </div>

  <div class="type-progress" id="typeProgress"></div>
</div>

<script>
// ===== CURSOR =====
const dot = document.getElementById('cursorDot');
document.addEventListener('mousemove', e => {
  dot.style.left = e.clientX + 'px';
  dot.style.top  = e.clientY + 'px';
});
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => dot.classList.add('hovering'));
  el.addEventListener('mouseleave', () => dot.classList.remove('hovering'));
});

// ===== TYPEWRITER =====
// 文本段落：[文字, 是否高亮橘色]
const segments = [
  ['Designing from ', false],
  ['insight,', true],
  [' not assumption.', false],
];

const fullText = segments.map(s => s[0]).join('');
const target = document.getElementById('typeTarget');
const progress = document.getElementById('typeProgress');
const btn = document.getElementById('enterBtn');

let charIndex = 0;
let started = false;

// 延迟 0.9s 后开始打字
setTimeout(() => { started = true; type(); }, 900);

function type() {
  if (charIndex > fullText.length) {
    // 打字完成，显示按钮
    setTimeout(() => btn.classList.add('visible'), 300);
    return;
  }

  // 更新进度条
  progress.style.width = (charIndex / fullText.length * 100) + '%';

  // 重建 innerHTML：已打出的字 + 光标
  let html = '';
  let pos = 0;
  for (const [text, isAccent] of segments) {
    const end = pos + text.length;
    const shown = fullText.slice(pos, Math.min(charIndex, end));
    if (shown.length > 0) {
      html += isAccent
        ? `<span class="accent-word">${shown}</span>`
        : shown;
    }
    pos = end;
    if (charIndex <= end) break;
  }
  html += '<span class="type-cursor"></span>';
  target.innerHTML = html;

  charIndex++;

  // 打字速度：标点稍慢，其他正常
  const ch = fullText[charIndex - 1] || '';
  const delay = /[,.]/.test(ch) ? 220 : 58;
  setTimeout(type, delay);
}

// ===== ENTER =====
btn.addEventListener('click', () => {
  document.getElementById('splash').classList.add('leaving');
  setTimeout(() => { window.location.href = 'index-v2.html'; }, 1000);
});
</script>
</body>
</html>
