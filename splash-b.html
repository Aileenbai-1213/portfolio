<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Splash B — ailin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f1ec;
    --ink: #1a1510;
    --ink-2: rgba(26,21,16,0.45);
    --ink-3: rgba(26,21,16,0.28);
    --accent: #e8572a;
    --ease: cubic-bezier(.22,1,.36,1);
  }
  * { cursor: none !important; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }

  /* ===== SPLASH ===== */
  #splash {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    overflow: hidden;
    transition: opacity 1s var(--ease);
  }
  #splash.leaving { opacity: 0; pointer-events: none; }

  /* Canvas 粒子背景 */
  #splashCanvas {
    position: absolute; inset: 0; z-index: 0;
  }

  /* 内容层 */
  .splash-inner {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* 形象图 */
  .splash-avatar {
    width: 140px; height: 140px;
    border-radius: 50%;
    overflow: hidden;
    margin-bottom: 28px;
    opacity: 0;
    transform: scale(.88) translateY(12px);
    animation: popIn .8s .3s var(--ease) forwards;
    box-shadow: 0 12px 40px rgba(26,21,16,0.12);
  }
  .splash-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

  .splash-name {
    font-family: 'Lora', serif;
    font-size: clamp(40px, 7vw, 80px);
    font-weight: 600; letter-spacing: -.03em;
    color: var(--ink); line-height: 1;
    margin-bottom: 12px;
    opacity: 0; transform: translateY(14px);
    animation: fadeUp .7s .8s var(--ease) forwards;
  }
  .splash-name .dot { color: var(--accent); }

  .splash-sub {
    font-family: 'Inter', sans-serif;
    font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--ink-2);
    margin-bottom: 44px;
    opacity: 0; transform: translateY(10px);
    animation: fadeUp .6s 1.05s var(--ease) forwards;
  }

  /* Enter 按钮 */
  .splash-btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 32px; border-radius: 100px;
    background: var(--ink); color: var(--bg);
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500; letter-spacing: .06em;
    opacity: 0; transform: translateY(10px);
    animation: fadeUp .6s 1.3s var(--ease) forwards;
    transition: background .2s, transform .3s var(--ease);
  }
  .splash-btn:hover { background: var(--accent); transform: translateY(-2px); }

  /* 鼠标跟随提示 */
  .splash-scroll-hint {
    position: absolute; bottom: 40px;
    font-family: 'Inter', sans-serif;
    font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-3);
    opacity: 0;
    animation: fadeUp .6s 1.7s var(--ease) forwards;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .scroll-line {
    width: 1px; height: 32px;
    background: linear-gradient(to bottom, var(--ink-3), transparent);
    animation: scrollPulse 2s 2s infinite;
  }
  @keyframes scrollPulse {
    0%,100% { opacity: .4; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.2); }
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes popIn {
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ===== CURSOR ===== */
  .cursor-dot {
    position: fixed; width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: width .25s var(--ease), height .25s var(--ease);
  }
  .cursor-dot.hovering { width: 22px; height: 22px; box-shadow: 0 0 0 4px rgba(232,87,42,0.18); }
</style>
</head>
<body>

<div class="cursor-dot" id="cursorDot"></div>

<div id="splash">
  <canvas id="splashCanvas"></canvas>

  <div class="splash-inner">
    <div class="splash-avatar">
      <img src="avatar_透明.png" alt="ailin" onerror="this.parentElement.style.background='#e6e1d8';this.style.display='none'"/>
    </div>
    <div class="splash-name">ailin<span class="dot">.</span></div>
    <div class="splash-sub">Product &amp; UX Designer</div>
    <button class="splash-btn" id="enterBtn">
      查看作品
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 6h10M6 1l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="splash-scroll-hint">
    <div class="scroll-line"></div>
    scroll
  </div>
</div>

<script>
// ===== CURSOR =====
const dot = document.getElementById('cursorDot');
document.addEventListener('mousemove', e => {
  dot.style.left = e.clientX + 'px';
  dot.style.top  = e.clientY + 'px';
});
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => dot.classList.add('hovering'));
  el.addEventListener('mouseleave', () => dot.classList.remove('hovering'));
});

// ===== CANVAS 暖色粒子 =====
const canvas = document.getElementById('splashCanvas');
const ctx = canvas.getContext('2d');
let pts = [], mx = -999, my = -999;

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  pts = [];
  const cols = Math.ceil(canvas.width / 52);
  const rows = Math.ceil(canvas.height / 52);
  for (let i = 0; i < cols; i++) {
    for (let j = 0; j < rows; j++) {
      pts.push({
        x: i * 52 + 26 + (Math.random() - .5) * 20,
        y: j * 52 + 26 + (Math.random() - .5) * 20,
        r: Math.random() * 1.4 + .5,
        base: Math.random() * .12 + .04,
      });
    }
  }
}
resize();
window.addEventListener('resize', resize);
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

(function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  pts.forEach(p => {
    const dx = mx - p.x, dy = my - p.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const glow = Math.max(0, 1 - dist / 160);
    const alpha = p.base + glow * .55;
    const r = p.r + glow * 2.2;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    // 橘色和暖棕混搭
    const warm = glow > .3;
    ctx.fillStyle = warm
      ? `rgba(232,87,42,${alpha})`
      : `rgba(60,45,20,${alpha})`;
    ctx.fill();
  });
  requestAnimationFrame(loop);
})();

// ===== ENTER =====
document.getElementById('enterBtn').addEventListener('click', () => {
  document.getElementById('splash').classList.add('leaving');
  setTimeout(() => { window.location.href = 'index-v2.html'; }, 1000);
});
</script>
</body>
</html>
